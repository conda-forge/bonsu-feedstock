{% set name = "Bonsu" %}
{% set version = "3.7.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | lower }}-{{ version }}.tar.gz
  sha256: 2a2539457f30cbf103c83c3bbceefac0546813557f5e5a238d50de4245a2236d
  patches:
    - 0001-Cython-is-not-a-runtime-dependency.patch

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv --global-option=build_ext --global-option=-I$PREFIX/include
  entry_points:
    - bonsu = bonsu.interface.bonsu:main

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - cython
    - fftw
    - h5py
    - hdf5
    - pillow
    # pip 25.3 removed support for --global-option, see https://github.com/pypa/pip/issues/11859
    - pip <25.3
    - python
    - setuptools
    - vtk
    - wxpython >=4.2.0
  run:
    - fftw
    - h5py
    - hdf5
    - numpy
    - pillow
    - python
    - vtk
    - wxpython >=4.2.0

test:
  imports:
    - bonsu
    - bonsu.docs
    - bonsu.image
    - bonsu.interface
    - bonsu.lib
    - bonsu.operations
    - bonsu.phasing
    - bonsu.sequences
  requires:   # [not win]
    - pip        # [not win]
  commands:   # [not win]
    - pip check  # [not win]

about:
  home: https://github.com/bonsudev/bonsu
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: bonsu/licence/gpl.txt
  summary: Bonsu - The Interactive Phase Retrieval Suite

extra:
  recipe-maintainers:
    - ndevenish
